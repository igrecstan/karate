<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Club - Connexion | FI-ADEKASH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .login-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #CCFCCD 0%, #FFFFF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            background: white
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(52, 221, 38, 0.25);
            max-width: 480px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .login-icon i {
            font-size: 2.5rem;
            color: white;
        }

        .login-logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e1e2a;
            margin-bottom: 0.5rem;
        }

        .login-logo p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 0.875rem 1rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: left;
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border-left: 4px solid #dc2626;
        }

        .alert-success {
            background: #d1fae5;
            color: #059669;
            border-left: 4px solid #059669;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-home {
            margin-top: 1.5rem;
            text-align: center;
        }

        .back-home a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-home a:hover {
            text-decoration: underline;
        }

        .info-text {
            background: #f0fdf4;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #166534;
            text-align: center;
        }

        .info-text i {
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-icon">
                <i class="fas fa-users"></i>
            </div>
            <div class="login-logo">
                <h1>connexion</h1>
                <p>Fédération Ivoirienne des Associations pour le Développement du Karaté Asai ryu et Style Homologués</p>
            </div>

            <div id="alertMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="clubId"><i class="fas fa-id-card"></i> Identifiant du club</label>
                    <input type="text" id="clubId" name="clubId" placeholder="Veuillez entrer votre indentifiant club" required autocomplete="off">
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Se connecter
                </button>
            </form>

            <div class="info-text">
                <i class="fas fa-info-circle"></i>
                Cet identifiant vous a été fourni par le secrétariat de la fédération.
                En cas de perte, veuillez contacter l'administrateur.
            </div>

            <div class="back-home">
                <a href="../index.html"><i class="fas fa-arrow-left"></i> Retour à l'accueil</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const alertMessage = document.getElementById('alertMessage');

        function showAlert(message, type) {
            alertMessage.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                if (alertMessage.innerHTML.includes(message)) {
                    alertMessage.innerHTML = '';
                }
            }, 5000);
        }

        function clearAlerts() {
            alertMessage.innerHTML = '';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearAlerts();

            const clubId = document.getElementById('clubId').value.trim().toUpperCase();

            if (!clubId) {
                showAlert('Veuillez saisir un identifiant', 'error');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Connexion en cours <span class="loading-spinner"></span>';

            try {
                const response = await fetch('/api/club/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ club_id: clubId })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('clubConnected', 'true');
                    sessionStorage.setItem('clubId', data.club_id);
                    sessionStorage.setItem('clubNom', data.nom_club);
                    sessionStorage.setItem('clubRepresentant', data.representant || '');
                    sessionStorage.setItem('clubContact', data.contact || '');
                    sessionStorage.setItem('clubEmail', data.email || '');
                    sessionStorage.setItem('clubWhatsapp', data.whatsapp || '');

                    showAlert('Connexion réussie ! Redirection en cours...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'espace.html';
                    }, 1000);
                } else {
                    showAlert(data.message || 'Identifiant invalide', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
                }
            } catch (error) {
                console.error('Erreur:', error);
                showAlert('Erreur de connexion au serveur. Veuillez réessayer.', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        });
    </script>
</body>
</html>
