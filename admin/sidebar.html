<div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <img src="../images/logo.jpg" alt="Logo FI-ADEKASH" onerror="this.src='https://via.placeholder.com/40'">
        <div>
            <div class="brand">FI-ADEKASH</div>
            <small>Administration</small>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Navigation</div>
        <a href="admin-dashboard.html" data-page="dashboard" class="nav-main">
            <i class="fas fa-tachometer-alt"></i> <span>Tableau de bord</span>
        </a>
        
        <!-- Menu Clubs avec sous-menu -->
        <div class="has-submenu" id="clubsMenu">
            <div class="nav-link" onclick="toggleSubmenu(event)">
                <i class="fas fa-building"></i> <span>Clubs</span>
                <i class="fas fa-chevron-down submenu-arrow"></i>
            </div>
            <div class="submenu" id="clubsSubmenu">
                <a href="clubs.html" data-page="clubs" class="submenu-link">
                    <i class="fas fa-list"></i> <span>Liste des clubs</span>
                </a>
                <a href="clubs-saison.html" data-page="clubs-saison" class="submenu-link">
                    <i class="fas fa-calendar-alt"></i> <span>Clubs par saison</span>
                </a>
                <a href="clubs-new.html" data-page="clubs-new" class="submenu-link">
                    <i class="fas fa-plus-circle"></i> <span>Nouveau club</span>
                </a>
            </div>
        </div>
        
        <a href="evenements.html" data-page="evenements" class="nav-main">
            <i class="fas fa-calendar-alt"></i> <span>Événements</span>
        </a>
        <a href="documents.html" data-page="documents" class="nav-main">
            <i class="fas fa-folder-open"></i> <span>Documents</span>
        </a>
        <a href="messages.html" data-page="messages" class="nav-main">
            <i class="fas fa-envelope"></i> <span>Messages</span>
            <span class="badge-message" id="unreadBadge">0</span>
        </a>
        <a href="utilisateurs.html" data-page="utilisateurs" class="nav-main">
            <i class="fas fa-users-cog"></i> <span>Utilisateurs</span>
        </a>
    </nav>
    <div class="sidebar-bottom">
        <button id="btnDeconnexion">
            <i class="fas fa-sign-out-alt"></i> <span>Déconnexion</span>
        </button>
    </div>
</div>

<script>
(function() {
    // Mettre à jour le nom de l'admin
    const adminLogin = sessionStorage.getItem('admin_login') || 'Admin';
    const adminNom = sessionStorage.getItem('admin_nom') || '';
    const adminPrenom = sessionStorage.getItem('admin_prenom') || '';
    
    const adminNameSpan = document.querySelector('.sidebar-logo small');
    if (adminNameSpan && (adminPrenom || adminNom)) {
        adminNameSpan.textContent = adminPrenom ? `${adminPrenom} ${adminNom}` : adminLogin;
    }
    
    // Charger le nombre de messages non lus
    async function loadUnreadCount() {
        try {
            const response = await fetch('/api/admin/messages/unread/count');
            const data = await response.json();
            if (data.success && data.count > 0) {
                const badge = document.getElementById('unreadBadge');
                if (badge) {
                    badge.textContent = data.count;
                }
            }
        } catch(e) {
            console.error('Erreur chargement compteur messages:', e);
        }
    }
    loadUnreadCount();
    
    // Surligner la page active
    const currentPage = window.location.pathname.split('/').pop();
    
    // Menu principal
    const mainLinks = document.querySelectorAll('.nav-main');
    mainLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href === currentPage) {
            link.classList.add('active');
        }
    });
    
    // Sous-menu
    const submenuLinks = document.querySelectorAll('.submenu-link');
    let activeSubmenuFound = false;
    submenuLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href === currentPage) {
            link.classList.add('active');
            activeSubmenuFound = true;
        }
    });
    
    // Ouvrir le sous-menu si actif
    if (activeSubmenuFound) {
        const clubsMenu = document.getElementById('clubsMenu');
        if (clubsMenu) {
            clubsMenu.classList.add('open');
        }
    }
    
    // Déconnexion
    const logoutBtn = document.getElementById('btnDeconnexion');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            try {
                await fetch('/api/admin/logout', { method: 'POST' });
            } catch(e) {
                console.error('Erreur déconnexion:', e);
            }
            sessionStorage.clear();
            window.location.href = 'admin-login.html';
        });
    }
})();

function toggleSubmenu(event) {
    event.preventDefault();
    event.stopPropagation();
    const parent = event.currentTarget.closest('.has-submenu');
    if (parent) {
        parent.classList.toggle('open');
    }
}
</script>
