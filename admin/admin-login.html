<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - FI-ADEKASH</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #a0aec0;
            font-size: 1.1rem;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #742a2a;
        }

        .success-message {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #22543d;
        }

        .info-message {
            background: #e0f2fe;
            color: #075985;
            border-left: 4px solid #075985;
        }

        .demo-hint {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            font-size: 12px;
            color: #a0aec0;
        }

        .demo-hint code {
            background: #f0f0f0;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>FI-ADEKASH</h1>
            <p>Espace Administration</p>
        </div>

        <div id="errorMessage" class="message error-message"></div>
        <div id="successMessage" class="message success-message"></div>
        <div id="infoMessage" class="message info-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Identifiant</label>
                <input type="text" id="username" placeholder="admin" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password" required>
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                Se connecter
            </button>
        </form>

        <div class="demo-hint">
            <i class="fas fa-info-circle"></i> Identifiants : <code>admin</code> / <code>admin123</code>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const infoMsg = document.getElementById('infoMessage');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye-slash');
            icon.classList.toggle('fa-eye');
        });

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            infoMsg.style.display = 'none';
        }

        // Vérifier si déjà connecté
        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        // Remplir les identifiants en local
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = passwordInput.value;
            
            if (!username || !password) {
                errorMsg.textContent = 'Veuillez remplir tous les champs';
                errorMsg.style.display = 'block';
                return;
            }
            
            hideMessages();
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Connexion en cours...';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login: username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    sessionStorage.setItem('admin_logged_in', 'true');
                    sessionStorage.setItem('admin_token', data.token);
                    sessionStorage.setItem('admin_login', username);
                    sessionStorage.setItem('admin_id', data.user?.id || '');
                    sessionStorage.setItem('admin_nom', data.user?.nom || '');
                    sessionStorage.setItem('admin_prenom', data.user?.prenom || '');
                    sessionStorage.setItem('admin_role', data.user?.role || 'Administrateur');
                    
                    successMsg.textContent = 'Connexion réussie ! Redirection...';
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    errorMsg.textContent = data.message || 'Identifiants incorrects';
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Se connecter';
                    passwordInput.value = '';
                }
            } catch (error) {
                console.error('Erreur:', error);
                errorMsg.textContent = 'Erreur de connexion au serveur';
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Se connecter';
            }
        });
    </script>
</body>
</html>
