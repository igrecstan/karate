<!-- admin/includes/sidebar.html -->
<aside class="sidebar">
    <div class="sidebar-header">
        <img src="/images/logo.jpg" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'">
        <h2>FI-ADEKASH</h2>
        <p class="sidebar-subtitle">Administration</p>
    </div>
    
    <nav class="sidebar-nav">
        <a href="/admin/dashboard.html" class="nav-link">
            <i class="fas fa-tachometer-alt"></i>
            <span>Tableau de bord</span>
        </a>
        <a href="/admin/clubs.html" class="nav-link">
            <i class="fas fa-building"></i>
            <span>Clubs</span>
        </a>
        <a href="/admin/evenements.html" class="nav-link">
            <i class="fas fa-calendar-alt"></i>
            <span>Événements</span>
        </a>
        <a href="/admin/documents.html" class="nav-link">
            <i class="fas fa-folder"></i>
            <span>Documents</span>
        </a>
        <a href="/admin/messages.html" class="nav-link">
            <i class="fas fa-envelope"></i>
            <span>Messages</span>
        </a>
    </nav>
    
    <div class="sidebar-footer">
        <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i>
            <span>Déconnexion</span>
        </button>
    </div>
</aside>

<style>
.sidebar {
    width: 280px;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    overflow-y: auto;
    z-index: 100;
}

.sidebar-header {
    padding: 30px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.sidebar-logo {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    margin-bottom: 15px;
    object-fit: cover;
}

.sidebar-header h2 {
    font-size: 20px;
    margin: 0 0 5px 0;
}

.sidebar-subtitle {
    font-size: 12px;
    opacity: 0.7;
    margin: 0;
}

.sidebar-nav {
    flex: 1;
    padding: 20px 0;
}

.nav-link {
    display: flex;
    align-items: center;
    padding: 12px 25px;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    transition: all 0.3s ease;
    gap: 12px;
}

.nav-link:hover {
    background: rgba(255,255,255,0.1);
    color: white;
    padding-left: 30px;
}

.nav-link.active {
    background: rgba(102, 126, 234, 0.3);
    color: white;
    border-right: 3px solid #667eea;
}

.nav-link i {
    width: 20px;
    font-size: 18px;
}

.sidebar-footer {
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.logout-btn {
    width: 100%;
    padding: 10px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.3s ease;
}

.logout-btn:hover {
    background: rgba(255,255,255,0.2);
}

.main-content {
    margin-left: 280px;
    flex: 1;
    min-height: 100vh;
    background: #f5f7fa;
}

@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s ease;
    }
    
    .sidebar.open {
        transform: translateX(0);
    }
    
    .main-content {
        margin-left: 0;
    }
}
</style>

<script>
// Script de la sidebar
document.addEventListener('DOMContentLoaded', function() {
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn && window.AdminAuth) {
        logoutBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            if (confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) {
                await window.AdminAuth.logout();
                window.location.href = '/admin/admin-login.html';
            }
        });
    }
    
    // Gestion du menu mobile
    const menuToggle = document.createElement('button');
    menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
    menuToggle.className = 'menu-toggle';
    menuToggle.style.cssText = `
        position: fixed;
        top: 15px;
        left: 15px;
        z-index: 1001;
        background: #667eea;
        border: none;
        color: white;
        padding: 10px 15px;
        border-radius: 8px;
        cursor: pointer;
        display: none;
    `;
    document.body.appendChild(menuToggle);
    
    const sidebar = document.querySelector('.sidebar');
    
    function checkMobile() {
        if (window.innerWidth <= 768) {
            menuToggle.style.display = 'block';
            if (sidebar) sidebar.classList.remove('open');
        } else {
            menuToggle.style.display = 'none';
            if (sidebar) sidebar.classList.remove('open');
        }
    }
    
    checkMobile();
    window.addEventListener('resize', checkMobile);
    
    if (menuToggle) {
        menuToggle.addEventListener('click', function() {
            if (sidebar) sidebar.classList.toggle('open');
        });
    }
});
</script>
