<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - FI-ADEKASH Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">Messages reçus</div>
                <div class="topbar-user">
                    <div class="avatar">AD</div>
                    <span>Administrateur</span>
                </div>
            </div>

            <div class="content">
                <div class="page-header">
                    <h2>Messages reçus</h2>
                    <p>Demandes et messages envoyés via le formulaire de contact.</p>
                </div>

                <div class="card">
                    <div class="card-header"><h3>Boîte de réception</h3></div>
                    <div class="messages-list" id="messagesList"><div class="loader">Chargement...</div></div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let messagesData = [];

        async function loadMessages() {
            const container = document.getElementById('messagesList');
            container.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
            try {
                const response = await fetch('/api/admin/messages');
                const result = await response.json();
                if (result.success) { messagesData = result.messages || []; displayMessages(); }
            } catch(e) { console.error(e); }
        }

        function displayMessages() {
            const container = document.getElementById('messagesList');
            if (!messagesData.length) { container.innerHTML = '<div class="loader">Aucun message</div>'; return; }
            container.innerHTML = messagesData.map(msg => `
                <div class="msg-item" style="opacity: ${msg.read ? '0.6' : '1'}">
                    <div class="msg-avatar">${(msg.nom || '?')[0]}</div>
                    <div class="msg-body">
                        <div class="msg-name">${escapeHtml(msg.nom)}${!msg.read ? '<span class="badge badge-orange" style="margin-left:6px;">Non lu</span>' : ''}</div>
                        <div class="msg-email">${escapeHtml(msg.email)} · ${formatDateTime(msg.date_creation)}</div>
                        <div class="msg-text">${escapeHtml(msg.message)}</div>
                        <div>${!msg.read ? `<button class="btn-action" onclick="markAsRead(${msg.id})"><i class="fas fa-check"></i> Marquer lu</button>` : ''}<button class="btn-action danger" onclick="deleteMessage(${msg.id})"><i class="fas fa-trash"></i> Supprimer</button></div>
                    </div>
                </div>
            `).join('');
        }

        async function markAsRead(id) {
            try {
                const response = await fetch(`/api/admin/messages/${id}/read`, { method: 'PUT' });
                const result = await response.json();
                if (result.success) { showNotification('Message marqué comme lu'); loadMessages(); }
            } catch(e) { showNotification('Erreur', 'error'); }
        }

        async function deleteMessage(id) {
            if (!confirm('Supprimer ce message ?')) return;
            try {
                const response = await fetch(`/api/admin/messages/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) { showNotification('Message supprimé'); loadMessages(); }
            } catch(e) { showNotification('Erreur', 'error'); }
        }

        loadMessages();
    </script>
</body>
</html>
