<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements - FI-ADEKASH Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        .btn-add { background: #3AAA35; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn-add:hover { background: #FBAC0D; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <div class="topbar">
                <div class="topbar-title">Gestion des événements</div>
                <div class="topbar-user">
                    <div class="avatar">AD</div>
                    <span>Administrateur</span>
                </div>
            </div>

            <div class="content">
                <div class="page-header">
                    <h2>Gestion des événements</h2>
                    <p>Gérez le calendrier des compétitions et stages.</p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Événements</h3>
                        <button class="btn-add" id="btnAddEvent"><i class="fas fa-plus"></i> Ajouter</button>
                    </div>

                    <div class="hidden" id="formAddEvent">
                        <div class="form-grid">
                            <div><label>Nom de l'événement *</label><input type="text" id="eventName" placeholder="Ex. Championnat régional"></div>
                            <div><label>Date *</label><input type="date" id="eventDate"></div>
                            <div><label>Lieu *</label><input type="text" id="eventLocation" placeholder="Ex. Abidjan"></div>
                            <div><label>Type</label><select id="eventType"><option>Compétition</option><option>Stage</option><option>Réunion</option><option>Gala</option></select></div>
                            <div class="full"><label>Description</label><textarea id="eventDesc" rows="2"></textarea></div>
                        </div>
                        <div class="form-actions">
                            <button class="btn-save" id="btnSaveEvent">Enregistrer</button>
                            <button class="btn-cancel" id="btnCancelEvent">Annuler</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead><tr><th>Date</th><th>Événement</th><th>Lieu</th><th>Type</th><th>Description</th><th>Actions</th></tr></thead>
                            <tbody id="eventsTableBody"><tr><td colspan="6" class="loader">Chargement...</td></tr>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3 id="modalTitle">Événement</h3><span class="close" onclick="closeEventModal()">&times;</span></div>
            <input type="hidden" id="eventId">
            <div class="form-group"><label>Nom</label><input type="text" id="modalEventName"></div>
            <div class="form-group"><label>Date</label><input type="date" id="modalEventDate"></div>
            <div class="form-group"><label>Lieu</label><input type="text" id="modalEventLocation"></div>
            <div class="form-group"><label>Type</label><select id="modalEventType"><option>Compétition</option><option>Stage</option><option>Réunion</option><option>Gala</option></select></div>
            <div class="form-group"><label>Description</label><textarea id="modalEventDesc" rows="3"></textarea></div>
            <div class="modal-buttons"><button class="btn-save" onclick="saveEventFromModal()">Enregistrer</button><button class="btn-cancel" onclick="closeEventModal()">Annuler</button></div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        let eventsData = [];

        async function loadEvents() {
            document.getElementById('eventsTableBody').innerHTML = '<td><td colspan="6" class="loader"><i class="fas fa-spinner fa-spin"></i> Chargement...</td></tr>';
            try {
                const response = await fetch('/api/admin/events');
                const result = await response.json();
                if (result.success) { eventsData = result.events || []; displayEvents(); }
            } catch(e) { console.error(e); }
        }

        function displayEvents() {
            if (!eventsData.length) { document.getElementById('eventsTableBody').innerHTML = '<tr><td colspan="6" class="loader">Aucun événement</td></tr>'; return; }
            document.getElementById('eventsTableBody').innerHTML = eventsData.map(e => `
                <tr>
                    <td>${formatDate(e.date)}</td>
                    <td><strong>${escapeHtml(e.name)}</strong></td>
                    <td>${escapeHtml(e.location)}</td>
                    <td><span class="badge ${e.type === 'Compétition' ? 'badge-green' : 'badge-orange'}">${escapeHtml(e.type)}</span></td>
                    <td>${escapeHtml(e.description || '-')}</td>
                    <td><button class="btn-action" onclick="editEvent(${e.id})"><i class="fas fa-pen"></i> Modifier</button><button class="btn-action danger" onclick="deleteEvent(${e.id})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
        }

        async function saveEvent() {
            const data = { name: document.getElementById('eventName').value, date: document.getElementById('eventDate').value, location: document.getElementById('eventLocation').value, type: document.getElementById('eventType').value, description: document.getElementById('eventDesc').value };
            if (!data.name || !data.date || !data.location) { showNotification('Champs obligatoires', 'error'); return; }
            try {
                const response = await fetch('/api/admin/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await response.json();
                if (result.success) { showNotification('Événement ajouté'); toggleEventForm(); loadEvents(); }
            } catch(e) { showNotification('Erreur', 'error'); }
        }

        async function deleteEvent(id) {
            if (!confirm('Supprimer cet événement ?')) return;
            try {
                const response = await fetch(`/api/admin/events/${id}`, { method: 'DELETE' });
                const result = await response.json();
                if (result.success) { showNotification('Événement supprimé'); loadEvents(); }
            } catch(e) { showNotification('Erreur', 'error'); }
        }

        async function editEvent(id) {
            const event = eventsData.find(e => e.id === id);
            if (event) {
                document.getElementById('modalTitle').textContent = 'Modifier l\'événement';
                document.getElementById('eventId').value = event.id;
                document.getElementById('modalEventName').value = event.name;
                document.getElementById('modalEventDate').value = event.date;
                document.getElementById('modalEventLocation').value = event.location;
                document.getElementById('modalEventType').value = event.type;
                document.getElementById('modalEventDesc').value = event.description || '';
                document.getElementById('eventModal').style.display = 'flex';
            }
        }

        async function saveEventFromModal() {
            const id = document.getElementById('eventId').value;
            const data = { name: document.getElementById('modalEventName').value, date: document.getElementById('modalEventDate').value, location: document.getElementById('modalEventLocation').value, type: document.getElementById('modalEventType').value, description: document.getElementById('modalEventDesc').value };
            try {
                const response = await fetch(`/api/admin/events/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await response.json();
                if (result.success) { showNotification('Événement modifié'); closeEventModal(); loadEvents(); }
            } catch(e) { showNotification('Erreur', 'error'); }
        }

        function toggleEventForm() { document.getElementById('formAddEvent').classList.toggle('hidden'); }
        function closeEventModal() { document.getElementById('eventModal').style.display = 'none'; }

        document.getElementById('btnAddEvent').onclick = toggleEventForm;
        document.getElementById('btnSaveEvent').onclick = saveEvent;
        document.getElementById('btnCancelEvent').onclick = toggleEventForm;
        loadEvents();
    </script>
</body>
</html>
