<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test API</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Test de connexion à l'API</h1>
    <div id="result"></div>
    
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Test en cours...</p>';
            
            // Test 1: Health check
            try {
                const healthResponse = await fetch('http://localhost:5000/health');
                const healthData = await healthResponse.json();
                resultDiv.innerHTML += `<p class="success">✅ Health check: ${JSON.stringify(healthData)}</p>`;
            } catch (e) {
                resultDiv.innerHTML += `<p class="error">❌ Serveur non accessible: ${e.message}</p>`;
                resultDiv.innerHTML += `<p>Vérifiez que le serveur Flask est démarré: <code>python app.py</code></p>`;
                return;
            }
            
            // Test 2: Login pour obtenir un token
            try {
                const loginResponse = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                const loginData = await loginResponse.json();
                
                if (loginData.success) {
                    resultDiv.innerHTML += `<p class="success">✅ Login réussi - Token obtenu</p>`;
                    const token = loginData.token;
                    
                    // Test 3: Récupérer les clubs avec le token
                    const clubsResponse = await fetch(`${API_URL}/clubs/`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const clubsData = await clubsResponse.json();
                    
                    if (clubsData.success) {
                        resultDiv.innerHTML += `<p class="success">✅ Récupération des clubs réussie (${clubsData.data?.length || 0} clubs)</p>`;
                        resultDiv.innerHTML += `<pre>${JSON.stringify(clubsData.data?.slice(0, 3), null, 2)}</pre>`;
                    } else {
                        resultDiv.innerHTML += `<p class="error">❌ Erreur clubs: ${clubsData.message}</p>`;
                    }
                } else {
                    resultDiv.innerHTML += `<p class="error">❌ Login échoué: ${loginData.message}</p>`;
                }
            } catch (e) {
                resultDiv.innerHTML += `<p class="error">❌ Erreur API: ${e.message}</p>`;
            }
        }
        
        testAPI();
    </script>
</body>
</html>
