<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FI-ADEKASH</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="site-header"></div>

    <main>
       
            <div class="container">
                <div class="section-title">Contacts</div> 
            </div> 

        <!-- Contact & adhésion -->
        <section id="contact" style="background:#ffffff; padding: 3rem 0;">
            <div class="container contact-grid">
                <div class="contact-info" style="color:#1e1e2a;">
                    <h3 style="color:#1e1e2a; font-size:1.8rem; margin-bottom:1rem;">Rejoignez-nous !</h3>
                    <p style="color:#4a5568; margin-bottom:1.5rem;">Votre club souhaite adhérer ? Vous voulez obtenir des informations ? Écrivez-nous !</p>
                    <div class="contact-detail" style="color:#1e1e2a;"><i class="fas fa-map-marker-alt" style="color:#2aa600;"></i> <span>Cocody, Abidjan, Côte d'Ivoire</span></div>
                    <div class="contact-detail" style="color:#1e1e2a;"><i class="fas fa-phone-alt" style="color:#2aa600;"></i> <span>+225 07 77 99 52 27</span> / <span>+225 07 08 31 32 09</span></div>
                    <div class="contact-detail" style="color:#1e1e2a;"><i class="fas fa-envelope" style="color:#2aa600;"></i> <span>contact@fiadekash.com</span></div>
                </div>
                <div class="contact-form" style="background:#2aa600; border-radius:2rem; padding:2rem;">
                    <h3 style="margin-bottom:1.2rem; color:#ffffff;">Nous écrire</h3>
                    <form id="contactForm">
                        <div class="form-group">
                            <input type="text" placeholder="Nom du club / représentant" id="nameInput" required
                                style="background:#ffffff; color:#1e1e2a; border:none; border-radius:2rem; padding:0.9rem 1rem; width:100%; font-family:inherit;">
                        </div>
                        <div class="form-group">
                            <input type="email" placeholder="Email" id="emailInput" required
                                style="background:#ffffff; color:#1e1e2a; border:none; border-radius:2rem; padding:0.9rem 1rem; width:100%; font-family:inherit;">
                        </div>
                        <div class="form-group">
                            <textarea rows="3" placeholder="Message ..." id="msgInput"
                                style="background:#ffffff; color:#1e1e2a; border:none; border-radius:1.5rem; padding:0.9rem 1rem; width:100%; font-family:inherit; resize:vertical;"></textarea>
                        </div>
                        <button type="submit" class="btn-submit" style="background:#ff8c00; color:#ffffff; font-weight:700; border:none; width:100%; padding:0.9rem; border-radius:40px; font-size:1rem; cursor:pointer;">
                            Envoyer la demande <i class="fas fa-paper-plane"></i>
                        </button>
                        <p id="formFeedback" style="margin-top:12px; font-size:0.8rem; color:#ffffff;"></p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

  

    <script src="js/layout.js"></script>
</body>
</html>
